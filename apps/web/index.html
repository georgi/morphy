<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morphy</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the
      // wrong theme. Key must match THEME_STORAGE_KEY in theme-provider.tsx.
      (function () {
        try {
          var stored = localStorage.getItem("chess-analyzer-theme");
          var dark =
            stored === "dark" ||
            ((stored === "system" || stored === null) &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.toggle("dark", dark);
          root.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
